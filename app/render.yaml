# Render Blueprint for StockWise Pro
# This file configures all services for deployment on Render

services:
  # PostgreSQL Database
  - type: pserv
    name: stockwise-pro-db
    runtime: docker
    plan: starter
    envVars:
      - key: POSTGRES_USER
        generateValue: true
      - key: POSTGRES_PASSWORD
        generateValue: true
      - key: POSTGRES_DB
        value: stockwise_pro
    disk:
      name: postgres-data
      mountPath: /var/lib/postgresql/data
      sizeGB: 10

  # Backend API Server
  - type: web
    name: stockwise-pro-api
    runtime: node
    plan: starter
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: stockwise-pro-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FMP_API_KEY
        value: W0ZNDulEbCUkYvy20BcDJIjN91dn4lTJ
      - key: CLIENT_URL
        value: https://stockwise-pro-web.onrender.com
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: alerts@stockwise.pro
    healthCheckPath: /health
    autoDeploy: true

  # Frontend Web App
  - type: web
    name: stockwise-pro-web
    runtime: static
    plan: starter
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://stockwise-pro-api.onrender.com/api
      - key: VITE_WS_URL
        value: wss://stockwise-pro-api.onrender.com
    autoDeploy: true

# Environment Groups (for shared secrets)
envVarGroups:
  - name: stockwise-pro-secrets
    envVars:
      - key: JWT_SECRET
        generateValue: true
