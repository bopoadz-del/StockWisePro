apiVersion: apps/v1
kind: Deployment
metadata:
  name: alphaspectrum-api
  namespace: alphaspectrum
  labels:
    app: alphaspectrum-api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: alphaspectrum-api
  template:
    metadata:
      labels:
        app: alphaspectrum-api
    spec:
      containers:
        - name: api
          image: ghcr.io/alphaspectrum/api:latest
          ports:
            - containerPort: 3001
              name: http
          envFrom:
            - configMapRef:
                name: alphaspectrum-config
            - secretRef:
                name: alphaspectrum-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: alphaspectrum-api
  namespace: alphaspectrum
  labels:
    app: alphaspectrum-api
spec:
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
      name: http
  selector:
    app: alphaspectrum-api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: alphaspectrum-api-hpa
  namespace: alphaspectrum
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: alphaspectrum-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
